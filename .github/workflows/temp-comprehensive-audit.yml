name: Temporary comprehensive audit
on:
  push:
    branches: [audit/comprehensive-review-20260717-v2]
permissions: {contents: write}
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {ref: audit/comprehensive-review-20260717-v2, fetch-depth: 0}
      - name: Audit
        shell: bash
        run: |
          python3 - <<'PY'
          import ast,collections,hashlib,html.parser,json,re,subprocess
          from pathlib import Path
          from urllib.parse import unquote,urlsplit
          R=Path('.').resolve(); O=R/'audit'; O.mkdir(exist_ok=True)
          skip={'.github/workflows/temp-comprehensive-audit.yml','audit/AUDIT_REPORT.md','audit/AUDIT_FILES.tsv','audit/AUDIT_FINDINGS.json'}
          P=[Path(x.decode('utf-8','surrogateescape')) for x in subprocess.check_output(['git','ls-files','-z']).split(b'\0') if x]; P=[p for p in P if p.as_posix() not in skip and (R/p).is_file()]
          F=[]; I=[]; S=[]; T={}; H=collections.defaultdict(list)
          def add(s,c,p,l,m): F.append({'severity':s,'category':c,'path':p.as_posix(),'line':l or 0,'message':m})
          def txt(p):
            if p not in T:
              b=(R/p).read_bytes(); T[p]=None if b'\0' in b else b.decode('utf-8','replace')
            return T[p]
          for p in P:
            f=R/p;t=txt(p);z=f.stat().st_size;l=t.count('\n')+1 if t is not None else 0;I.append((p.as_posix(),z,l,p.suffix.lower() or '[none]'))
            if 0<z<=5242880:H[hashlib.sha256(f.read_bytes()).hexdigest()].append(p.as_posix())
            if p.suffix.lower()=='.js' and z<2097152 and not p.name.endswith('.min.js'):
              r=subprocess.run(['node','--check',p.as_posix()],text=True,capture_output=True);S.append((p.as_posix(),'JS',r.returncode==0,(r.stderr or r.stdout).strip()));
              if r.returncode:add('HIGH','syntax',p,0,'JavaScript syntax check failed')
            elif p.suffix.lower()=='.json':
              try:json.loads((R/p).read_text('utf-8'));S.append((p.as_posix(),'JSON',True,''))
              except Exception as e:S.append((p.as_posix(),'JSON',False,str(e)));add('HIGH','syntax',p,0,f'Invalid JSON: {e}')
            elif p.suffix.lower()=='.py':
              try:ast.parse((R/p).read_text('utf-8'));S.append((p.as_posix(),'Python',True,''))
              except Exception as e:S.append((p.as_posix(),'Python',False,str(e)));add('HIGH','syntax',p,0,f'Python syntax error: {e}')
          class X(html.parser.HTMLParser):
            def __init__(self,p):super().__init__(convert_charrefs=True);self.p=p;self.ids=collections.Counter();self.refs=[]
            def handle_starttag(self,g,a):
              d=dict(a);n=self.getpos()[0]
              if d.get('id'):self.ids[d['id']]+=1
              for k,v in a:
                if k.lower().startswith('on') and v:add('MEDIUM','inline-event',self.p,n,f'Inline handler {k}')
              k='href' if g in {'a','link'} else 'src'
              if g in {'a','link','script','img','audio','video','source','iframe'} and d.get(k):self.refs.append((n,g,k,d[k]))
              if g=='a' and d.get('target')=='_blank' and 'noopener' not in (d.get('rel') or ''):add('MEDIUM','reverse-tabnabbing',self.p,n,'target=_blank without noopener')
          for p in [q for q in P if q.suffix.lower() in {'.html','.htm'}]:
            x=X(p);t=txt(p)
            if t is None:continue
            try:x.feed(t)
            except Exception as e:add('MEDIUM','html-parse',p,0,str(e))
            for i,c in x.ids.items():
              if c>1:add('MEDIUM','duplicate-id',p,0,f'id={i} appears {c} times')
            for n,g,k,v in x.refs:
              if not v or v.startswith(('#','mailto:','tel:','javascript:','data:','blob:')):continue
              u=urlsplit(v)
              if u.scheme in {'http','https'} or v.startswith('//'):
                if ' ' in v:add('HIGH','external-reference',p,n,f'URL contains spaces: {v}')
                if u.scheme=='http':add('MEDIUM','mixed-content',p,n,f'HTTP reference: {v}')
                continue
              q=(R/p.parent/unquote(u.path)).resolve()
              try:q.relative_to(R)
              except ValueError:add('MEDIUM','path-reference',p,n,f'Reference escapes repo: {v}');continue
              if not q.exists():add('HIGH','broken-reference',p,n,f'Missing local {g} {k}: {v}')
          pats=[('HIGH','dynamic-code',r'\beval\s*\(','eval()'),('HIGH','dynamic-code',r'\bnew\s+Function\s*\(','new Function()'),('MEDIUM','html-sink',r'\.innerHTML\s*=','innerHTML assignment'),('MEDIUM','html-sink',r'insertAdjacentHTML\s*\(','insertAdjacentHTML'),('MEDIUM','html-sink',r'document\.write\s*\(','document.write'),('LOW','storage',r'\blocalStorage\b','localStorage is user-controlled'),('LOW','network',r'\bfetch\s*\(','fetch needs status/schema validation'),('HIGH','command',r'shell\s*=\s*True','shell=True'),('MEDIUM','command',r'\bos\.system\s*\(','os.system'),('HIGH','deserialization',r'\bpickle\.(load|loads)\s*\(','unsafe pickle')]
          sec=[('private key',r'-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----'),('token/key',r'gh[pousr]_[A-Za-z0-9_]{20,}|AIza[0-9A-Za-z_-]{30,}|\bsk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}')]
          E={'.js','.mjs','.cjs','.ts','.tsx','.jsx','.html','.htm','.css','.json','.py','.php','.rb','.java','.kt','.dart','.go','.rs','.sh','.ps1','.yml','.yaml','.md','.txt','.xml','.toml','.ini','.env'}
          for p in P:
            if p.suffix.lower() not in E and p.name not in {'.env','.gitignore'}:continue
            t=txt(p)
            if t is None:continue
            for n,line in enumerate(t.splitlines(),1):
              for s,c,r,m in pats:
                if re.search(r,line):add(s,c,p,n,m)
              for m,r in sec:
                if re.search(r,line):add('CRITICAL','secret',p,n,f'Possible committed {m}; value hidden')
            if p.as_posix().startswith('.github/workflows/'):
              if re.search(r'pull_request_target\s*:',t):add('HIGH','workflow',p,0,'pull_request_target requires review')
              for n,line in enumerate(t.splitlines(),1):
                m=re.search(r'uses:\s*([^\s#]+)@([^\s#]+)',line)
                if m and not re.fullmatch(r'[0-9a-fA-F]{40}',m.group(2)):add('LOW','workflow-pin',p,n,f'{m.group(1)} not pinned to SHA')
          ign=subprocess.run(['git','ls-files','-ci','--exclude-standard'],text=True,capture_output=True).stdout.splitlines();B=[p.as_posix() for p in P if re.search(r'(backup|bak|archive|snapshot|(^|/)old(/|_|-|$)|(^|/)copy(/|_|-|$))',p.as_posix().lower())];Q=[p.as_posix() for p in P if re.search(r'(^|/)(test|tests|spec|specs)(/|$)|(test|spec)\.',p.as_posix().lower())];M=[p.as_posix() for p in P if p.name.lower() in {'package.json','package-lock.json','yarn.lock','pnpm-lock.yaml','requirements.txt','pyproject.toml','poetry.lock','pipfile','composer.json','cargo.toml','go.mod'}];W=[p.as_posix() for p in P if p.as_posix().startswith('.github/workflows/')];D=[v for v in H.values() if len(v)>1]
          o={'CRITICAL':0,'HIGH':1,'MEDIUM':2,'LOW':3};F.sort(key=lambda x:(o.get(x['severity'],9),x['path'],x['line']));C=collections.Counter(x['severity'] for x in F)
          (O/'AUDIT_FILES.tsv').write_text('path\tbytes\tlines\text\n'+'\n'.join('\t'.join(map(str,r)) for r in sorted(I))+'\n','utf-8');(O/'AUDIT_FINDINGS.json').write_text(json.dumps(F,ensure_ascii=False,indent=2),'utf-8')
          md=['# Comprehensive repository audit','',f'- Files: **{len(I)}**',f'- Bytes: **{sum(x[1] for x in I):,}**',f'- Findings: CRITICAL {C["CRITICAL"]}, HIGH {C["HIGH"]}, MEDIUM {C["MEDIUM"]}, LOW {C["LOW"]}','','## Syntax checks','']+[f'- {"PASS" if ok else "FAIL"} `{p}` ({k})'+(f': {d[:250]}' if d else '') for p,k,ok,d in S]
          md+=['','## Findings','']+([f'- **{x["severity"]} · {x["category"]}** `{x["path"]}:{x["line"]}` — {x["message"]}' for x in F] or ['- None'])+['','## Structure','',f'- Workflows: {W or "none"}',f'- Manifests: {M or "none"}',f'- Tests: {Q or "none"}',f'- Backup-like paths: {len(B)}',f'- Tracked but ignored: {ign or "none"}',f'- Duplicate file groups: {len(D)}','','## Largest files','']+[f'- `{p}` — {z:,} bytes, {l} lines' for p,z,l,e in sorted(I,key=lambda x:-x[1])[:40]]+['','## Limitations','','- Pattern matches require manual validation.','- Static audit does not exercise production networking, visual layout, or every user interaction.','']
          (O/'AUDIT_REPORT.md').write_text('\n'.join(md),'utf-8')
          PY
      - name: Commit reports
        run: |
          git config user.name repo-audit-bot
          git config user.email repo-audit-bot@users.noreply.github.com
          git add audit/AUDIT_REPORT.md audit/AUDIT_FILES.tsv audit/AUDIT_FINDINGS.json
          git rm .github/workflows/temp-comprehensive-audit.yml
          git commit -m "audit: generate comprehensive static review artifacts"
          git push origin HEAD:audit/comprehensive-review-20260717-v2
