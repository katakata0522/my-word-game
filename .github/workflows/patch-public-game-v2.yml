name: One-time word game quality patch v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-public-game-v2.yml

permissions:
  contents: write

jobs:
  patch-target-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-game-quality
          fetch-depth: 0

      - name: Patch and verify game files
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html_path = Path('index.html')
          html = html_path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global html
              count = html.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, got {count}')
              html = html.replace(old, new, 1)

          replace_once(
              'canvas-confetti@   1.9.3/dist/confetti.browser.min.js',
              'canvas-confetti@1.9.3/dist/confetti.browser.min.js',
              'confetti CDN'
          )
          replace_once(
              'color: navy; /* 例: 基本の文字色を濃い青に *',
              'color: navy; /* 例: 基本の文字色を濃い青に */',
              'CSS comment'
          )

          pattern = r'''(@keyframes winEffect\s*\{.*?\n\s*\}\n)\s*\}\n(\s*/\* ゲームオーバー時のメッセージ \*/)'''
          html, count = re.subn(pattern, r'\1\2', html, count=1, flags=re.DOTALL)
          if count != 1:
              raise SystemExit(f'extra CSS brace: expected 1 match, got {count}')

          html_path.write_text(html, encoding='utf-8')

          js_path = Path('game_ver2.js')
          js = js_path.read_text(encoding='utf-8')
          js, count = re.subn(
              r'^\s*console\.log\("今回のお題:", currentWord, "カテゴリ:", currentCategory\);\s*$',
              '',
              js,
              count=1,
              flags=re.MULTILINE
          )
          if count != 1:
              raise SystemExit(f'answer log: expected 1 match, got {count}')
          js_path.write_text(js, encoding='utf-8')
          PY

          node --check game_ver2.js

          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          js = Path('game_ver2.js').read_text(encoding='utf-8')
          assert 'canvas-confetti@1.9.3/dist/confetti.browser.min.js' in html
          assert '@   1.9.3' not in html
          assert 'color: navy; /* 例: 基本の文字色を濃い青に */' in html
          assert 'console.log("今回のお題:"' not in js
          assert html.count('@keyframes winEffect') == 1
          print('Targeted checks passed')
          PY

          git config user.name "chatgpt-coding-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html game_ver2.js
          git commit -m "fix: repair public word game assets and styles"
          git push origin HEAD:fix/public-game-quality

      - name: Remove one-time workflow from main
        if: always()
        shell: bash
        run: |
          git fetch origin main
          git checkout -B main origin/main
          if [ -f .github/workflows/patch-public-game-v2.yml ]; then
            git rm .github/workflows/patch-public-game-v2.yml
            git config user.name "chatgpt-coding-agent"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove one-time word game workflow v2"
            git push origin HEAD:main
          fi
