name: One-time word game HTML patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-public-game-v3.yml

permissions:
  contents: write

jobs:
  patch-target-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-game-quality
          fetch-depth: 0

      - name: Patch and verify HTML
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          changes = [
              (
                  'canvas-confetti@   1.9.3/dist/confetti.browser.min.js',
                  'canvas-confetti@1.9.3/dist/confetti.browser.min.js',
                  'confetti CDN'
              ),
              (
                  'color: navy; /* 例: 基本の文字色を濃い青に *',
                  'color: navy; /* 例: 基本の文字色を濃い青に */',
                  'CSS comment'
              ),
              (
                  '''            }
                      }
                      }
                      /* ゲームオーバー時のメッセージ */''',
                  '''            }
                      }
                      /* ゲームオーバー時のメッセージ */''',
                  'extra CSS brace'
              )
          ]

          for old, new, label in changes:
              count = html.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, got {count}')
              html = html.replace(old, new, 1)

          path.write_text(html, encoding='utf-8')
          PY

          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          js = Path('game_ver2.js').read_text(encoding='utf-8')
          assert 'canvas-confetti@1.9.3/dist/confetti.browser.min.js' in html
          assert '@   1.9.3' not in html
          assert 'color: navy; /* 例: 基本の文字色を濃い青に */' in html
          assert '''        }
                  }
                  /* ゲームオーバー時のメッセージ */''' not in html
          assert 'console.log("今回のお題:"' not in js
          print('Targeted checks passed')
          PY

          node --check game_ver2.js
          git config user.name "chatgpt-coding-agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix: repair word game stylesheet and confetti URL"
          git push origin HEAD:fix/public-game-quality

      - name: Remove one-time workflow from main
        if: always()
        shell: bash
        run: |
          git fetch origin main
          git checkout -B main origin/main
          if [ -f .github/workflows/patch-public-game-v3.yml ]; then
            git rm .github/workflows/patch-public-game-v3.yml
            git config user.name "chatgpt-coding-agent"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove one-time word game HTML workflow"
            git push origin HEAD:main
          fi
